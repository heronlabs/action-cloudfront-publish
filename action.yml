name: action-cloudfront-publish

author: Heron Labs

description: Invalidate an AWS CloudFront distribution so downstream viewers pick up fresh origin content.

branding:
  icon: cloud
  color: orange

inputs:
  AWS_ROLE_TO_ASSUME:
    description: ARN of the IAM role to assume via OIDC.
    required: true
  AWS_REGION:
    description: AWS region used when calling CloudFront.
    required: true
  AWS_ROLE_DURATION_SECONDS:
    description: Duration in seconds for the assumed role session.
    required: true
  DISTRIBUTION_ID:
    description: CloudFront distribution ID to invalidate.
    required: true

runs:
  using: composite
  steps:
    - name: 'Configure AWS Credentials'
      uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
      with:
        aws-region: ${{ inputs.AWS_REGION }}
        role-to-assume: ${{ inputs.AWS_ROLE_TO_ASSUME }}
        role-duration-seconds: ${{ inputs.AWS_ROLE_DURATION_SECONDS }}
        role-session-name: action-cloudfront-publish-session

    - name: 'Publish to CloudFront'
      shell: bash
      run: bash ${{ github.action_path }}/core/publish.sh
      env:
        DISTRIBUTION_ID: ${{ inputs.DISTRIBUTION_ID }}
